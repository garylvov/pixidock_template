name: Pre-commit

on:
  pull_request:
    branches: [ main, master ]
  push:
    branches: [ main, master ]

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Initialize submodules
        run: |
          export PIXI_PROJECT_ROOT=$(pwd)
          bash scripts/get_submodules_and_patches.bash

      - name: Install Pixi
        uses: prefix-dev/setup-pixi@v0.10.0
        with:
          pixi-version: v0.73.0
          # Consume the committed Retread source-package records verbatim.
          # Re-solving here needlessly reopens unrelated upstream drift.
          frozen: true

      - name: Run lint
        run: |
          pixi run --frozen --environment test lint
