[workspace]
channels = ["https://prefix.dev/conda-forge"]
name = "TEMPLATE"
platforms = ["linux-64"]
version = "0.1.0"
preview = ["pixi-build"]
build-variants = { python = ["3.12"] }
# Map conda pywin32 to satisfy pypi pywin32 requirement (isaacsim needs pywin32 but it's Windows-only on PyPI)
conda-pypi-map = { "https://prefix.dev/conda-forge" = "patches/conda_pypi_map.json" }

# Global PyPI options - extra indexes for NVIDIA and MuJoCo packages
[pypi-options]
extra-index-urls = ["https://pypi.nvidia.com", "https://py.mujoco.org"]
index-strategy = "unsafe-best-match"

# Override malformed dependencies from mujoco-warp and newton git packages
# [pypi-options.dependency-overrides]
# warp-lang = ">=1.11.0.dev0"
# mujoco = ">=3.3.7"

#### Base Bare Bones Environment

[dependencies] # Global dependencies across all environments
python = "==3.12"
pip = ">=25.1.1,<26"
hatchling = ">=1.27.0,<2"
numpy = ">=1.26.4,<3"
matplotlib = ">=3.10.3,<4"
jupyter = ">=1.1.1,<2"
ipywidgets = ">=8.1.5,<9"
toml = ">=0.10.2,<0.11"


[tasks]
# Git submodule initialization + apply patches
gitmod = "bash scripts/get_submodules_and_patches.bash"
[target.unix.activation]
scripts = ["scripts/post-install.bash"] # pip  install the package in editable mode

#### All possible environment combinations
[environments]
cpu = { features = ["cpu"] } # All you need for bare-bones
test = { features = ["test", "cpu"] } # This environment is relied upon by default by the CI

## The following environment combinations are optional and can safely be removed if not needed.
gpu = { features = ["gpu", ] }
test-gpu = { features = ["gpu", "test", ] }
ros2-humble-gpu = { features = [ "gpu", "ros2-humble", ]}
ros2-humble-cpu = { features = ["cpu", "ros2-humble"]}
genesis-gpu = { features = ["gpu", "genesis"]}
genesis-ros2-humble-gpu = { features = ["gpu", "genesis", "ros2-humble", ]} # Advanced users ;)

# Isaac Lab v3.0.0-beta pack includes Isaac Sim 6, PhysX, and Newton.
isaaclab-gpu = { features = ["isaaclab", "gpu"] }
isaaclab-ros2-humble-gpu = { features = ["isaaclab", "ros2-humble", "gpu"] }
isaaclab-gpu-latest = { features = ["isaaclab-latest", "gpu"] }
newton-gpu = { features = ["newton", "gpu"] }

# ROS 2 Jazzy variants (mirror the Humble envs; see [feature.ros2-jazzy]).
ros2-jazzy-gpu = { features = ["gpu", "ros2-jazzy"] }
ros2-jazzy-cpu = { features = ["cpu", "ros2-jazzy"] }
genesis-ros2-jazzy-gpu = { features = ["gpu", "genesis", "ros2-jazzy"] }
isaaclab-ros2-jazzy-gpu = { features = ["isaaclab", "ros2-jazzy", "gpu"] }
# Now, for the other environment configurations.
# Feel free to ignore and delete features you don't need!

[feature.cpu]

#### Test Environment----------------------------------------------------------------------------
# This environment is relied upon by default by the CI in .github/workflows/pre-commit.yml
[feature.test.dependencies]
pytest = ">=7.0.0"
pre-commit = ">=3.6.0"
[feature.test.tasks]
lint = "pre-commit run --all-files --show-diff-on-failure"
test = "python -m pytest test/* -v"

#### GPU Environment-----------------------------------------------------------------------------
[feature.gpu]
# Channels would go here.

# Set CUDA_HOME for torch.compile/Triton to find ptxas
[feature.gpu.activation.env]
CUDA_HOME = "$CONDA_PREFIX"
# Prioritize the env's own libs on the loader path. Two reasons on shared HPC
# (OSCAR/CCV): (1) some site module systems leak libstdc++ into LD_LIBRARY_PATH,
# shadowing conda's newer one (GLIBCXX_3.4.30 ImportError); (2) conda pytorch's
# libtorch_cuda.so needs conda nccl (in $CONDA_PREFIX/lib) rather than a stale
# bundled CUDA lib. Prepending $CONDA_PREFIX/lib makes the env authoritative.
LD_LIBRARY_PATH = "$CONDA_PREFIX/lib:$LD_LIBRARY_PATH"

[feature.gpu.system-requirements]
# Thank you to Matthew Feickert for the system requirements tip!
# https://pixi.sh/latest/workspace/system_requirements/
# https://matthewfeickert-talks.github.io/reproducible-ml-for-scientists-with-pixi-scipy-2025/cuda-conda
# NOTE: this legacy [system-requirements] table works on pixi 0.70-0.72
# (0.71+ only warns that it is deprecated). The pixi 0.71+ rich `platforms`
# form is also supported by retread >=4.1.0, e.g. in [workspace]:
#   platforms = [{ platform = "linux-64", glibc = "2.35", cuda = "12" }]
cuda   = "12"
[feature.gpu.dependencies]
# Keep the torch family on conda. conda-forge's PyTorch 2.10 GPU builds require CUDA 12.9.
cuda-version = "==12.9"
cuda-nvcc_linux-64 = "12.9.*"
cuda-toolkit = "12.9.*"
pytorch-gpu = "==2.10.0"
torchvision = "==0.25.0"
torchaudio = "==2.10.0"
imageio = ">=2.37.0,<3"
scikit-image = ">=0.25.2,<0.26"

[feature.gpu.pypi-dependencies]
# Special thank you to @MiroPsota for these wheels
# https://github.com/facebookresearch/pytorch3d/discussions/1752?
pytorch3d = { version = "==0.7.9+d9839a9pt2.10.0cu128", index = "https://miropsota.github.io/torch_packages_builder" }
mujoco = ">=3.3.3"
mujoco-mjx = "*"

#### Genesis Simulation Environment------------------------------------------------------------
[feature.genesis.dependencies]
genesis-pack = { path = "./genesis-pack" }
# numpy = "==1.26.4" # otherwise, genesis complains:
[feature.genesis.target.unix.activation]
scripts = ["scripts/config-genesis.bash"]

#### ROS 2 Environment---------------------------------------------------------------------------
[feature.ros2-humble]
# "https://prefix.dev/robostack-[humble|jazzy|kilted]"
channels = ["https://prefix.dev/robostack-humble", "https://prefix.dev/conda-forge", ]
[feature.ros2-humble.dependencies]
# For minimal dep set
ros-humble-ros-core	= "*"
# For full feature set
ros-humble-rviz2 = "*"
ros-humble-rosbag2 = "*"
ros-humble-rosbag2-storage-mcap = "*"

compilers = "*"
cmake = "*"
pkg-config = "*"
make = "*"
ninja = "*"

colcon-common-extensions = "*" # needed for using humble_ws/colcon-defaults.yaml
colcon-mixin = "*"
# Maybe extra colcon stuff...
colcon-devtools = "*"
colcon-parallel-executor = "*"
colcon-defaults = "*"
colcon-package-selection = "*"
colcon-python-setup-py = "*"
colcon-recursive-crawl = "*"
colcon-ros = "*"

# " error: option --editable not recognized for setuptools==80.1.0 " occurs for building ROS 2 Humble Python Packages
setuptools = ">=59.6.0,<=79.0.1"

[feature.ros2-humble.tasks]
bag-humble = "ros2 bag record -s mcap --all"
build-ros-humble = "colcon build"
[feature.ros2-humble.target.unix.activation]
scripts = ["scripts/config-ros2-colcon-humble.bash"]

#### ROS 2 Jazzy Environment----------------------------------------------------------------------
# Mirrors [feature.ros2-humble] for the jazzy_ws colcon workspace. Builds with
# `pixi run -e ros2-jazzy-cpu build-ros-jazzy`; the activation sources the jazzy
# overlay + points COLCON_DEFAULTS_FILE at jazzy_ws/colcon-defaults.yaml.
[feature.ros2-jazzy]
# "https://prefix.dev/robostack-[humble|jazzy|kilted]"
channels = ["https://prefix.dev/robostack-jazzy", "https://prefix.dev/conda-forge", ]
[feature.ros2-jazzy.dependencies]
# For minimal dep set
ros-jazzy-ros-core = "*"
# For full feature set
ros-jazzy-rviz2 = "*"
ros-jazzy-rosbag2 = "*"
ros-jazzy-rosbag2-storage-mcap = "*"

compilers = "*"
cmake = "*"
pkg-config = "*"
make = "*"
ninja = "*"

colcon-common-extensions = "*" # needed for using jazzy_ws/colcon-defaults.yaml
colcon-mixin = "*"
colcon-devtools = "*"
colcon-parallel-executor = "*"
colcon-defaults = "*"
colcon-package-selection = "*"
colcon-python-setup-py = "*"
colcon-recursive-crawl = "*"
colcon-ros = "*"

# Same setuptools cap as Humble: setuptools 80+ drops `--editable`, breaking
# colcon-python-setup-py builds of ROS 2 Python packages.
setuptools = ">=59.6.0,<=79.0.1"

[feature.ros2-jazzy.tasks]
bag-jazzy = "ros2 bag record -s mcap --all"
build-ros-jazzy = "colcon build"
[feature.ros2-jazzy.target.unix.activation]
scripts = ["scripts/config-ros2-colcon-jazzy.bash"]

### Isaac Lab / Isaac Sim Environment-----------------------------------------------------------
# Isaac Sim 6.0.0.0:
#   Python 3.12, NumPy 2.3.1, PyTorch 2.10.0, torchvision 0.25.0, torchaudio 2.10.0
# IsaacLab is pulled through isaac-pack/ with pixi-build-retread at v3.0.0-beta (a4a7602).
#
# Upstream IsaacLab dependency shape, if expressed as "all IsaacLab extras except Isaac Sim":
#   isaaclab[all]
# In source/isaaclab/setup.py, the "all" extra expands to the IsaacLab subpackages only:
#   assets, physx, contrib, mimic, newton, rl, tasks, teleop, visualizers[all]
# It intentionally does not include the separate "isaacsim" extra. We keep Isaac Sim 6 explicit in
# isaac-pack/pixi.toml instead, because the upstream "isaacsim" extra is stale for this release line.
#
# Direct Pixi PyPI Git-dependency sketch for that upstream shape:
#   [feature.isaaclab.pypi-dependencies]
#   isaaclab = { git = "https://github.com/isaac-sim/IsaacLab.git", rev = "a4a7602f29e755e2673fe0022ea35566df6dd7d5", subdirectory = "source/isaaclab", extras = ["all"] }
# The active retread config expands the sibling IsaacLab packages from the same Git revision instead.
[feature.isaaclab]
[feature.isaaclab.dependencies]
isaac-pack = { path = "./isaac-pack" }
sysroot_linux-64 = ">=2.35"
# Need newer GCC/binutils to work with glibc 2.39's .relr.dyn sections
gxx_linux-64 = ">=12"
gcc_linux-64 = ">=12"
binutils_linux-64 = ">=2.40"
cmake = ">3.6"
numpy = "==2.3.1"
ipywidgets = "==8.1.5"
[feature.isaaclab.target.unix.activation]
scripts = ["scripts/config-isaacsim.bash"]
[feature.isaaclab.system-requirements]
# Legacy form (works on pixi 0.70-0.72); the 0.71+ rich `platforms` form is
# also supported -- see the note on [feature.gpu.system-requirements].
libc = "2.35"

### Isaac Lab Latest Environment-----------------------------------------------------------------
# Mirrors [feature.isaaclab], but consumes isaac-pack-latest/ with IsaacLab and
# sibling packages pinned to 28a37cecdd433c22d9eabd6a5954add9f13a8951.
[feature.isaaclab-latest]
[feature.isaaclab-latest.dependencies]
isaac-pack-latest = { path = "./isaac-pack-latest" }
sysroot_linux-64 = ">=2.35"
# Need newer GCC/binutils to work with glibc 2.39's .relr.dyn sections
gxx_linux-64 = ">=12"
gcc_linux-64 = ">=12"
binutils_linux-64 = ">=2.40"
cmake = ">3.6"
numpy = "==2.3.1"
ipywidgets = "==8.1.5"
[feature.isaaclab-latest.target.unix.activation]
scripts = ["scripts/config-isaacsim.bash"]
[feature.isaaclab-latest.system-requirements]
# Legacy form (works on pixi 0.70-0.72); the 0.71+ rich `platforms` form is
# also supported -- see the note on [feature.gpu.system-requirements].
libc = "2.35"

### Newton Environment---------------------------------------------------------------------------
# Newton is pinned from source in newton-pack-latest/.
[feature.newton.dependencies]
newton-pack-latest = { path = "./newton-pack-latest" }
mujoco-python = ">=3.8,<3.9"
mujoco-warp = ">=3.8.0.3,<3.9"
newton-actuators = ">=0.1.0,<0.1.1"
